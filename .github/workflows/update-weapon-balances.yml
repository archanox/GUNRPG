name: Update Weapon Balances

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-balances:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Fetch weapon stats
        run: dotnet run --project scripts/FetchWeaponStats/FetchWeaponStats.csproj

      - name: Commit new snapshot
        run: |
          # Pick up any snapshot files (new or modified) written by the script.
          CHANGED_SNAPSHOTS=$(git status --porcelain balances/ | awk '{print $2}')
          if [ -z "$CHANGED_SNAPSHOTS" ]; then
            echo "No snapshot file changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Derive the commit message date from the first changed snapshot filename.
          SNAPSHOT_FILE=$(echo "$CHANGED_SNAPSHOTS" | head -n1)
          SNAPSHOT_DATE=$(basename "$SNAPSHOT_FILE" .json)
          git add $CHANGED_SNAPSHOTS
          git commit -m "Balance snapshot ${SNAPSHOT_DATE}"
          git push
