name: Update Weapon Balances

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-balances:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Fetch weapon stats
        run: dotnet run --project scripts/FetchWeaponStats/FetchWeaponStats.csproj

      - name: Commit new snapshot
        run: |
          # Pick up any new (untracked) snapshot files written by the script.
          NEW_SNAPSHOTS=$(git ls-files --others --exclude-standard balances/)
          if [ -z "$NEW_SNAPSHOTS" ]; then
            echo "No new snapshot file to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Derive the commit message date from the snapshot filename.
          SNAPSHOT_DATE=$(echo "$NEW_SNAPSHOTS" | head -n1 | xargs basename .json | sed 's/\.json//')
          git add $NEW_SNAPSHOTS
          git commit -m "Balance snapshot ${SNAPSHOT_DATE}"
          git push
